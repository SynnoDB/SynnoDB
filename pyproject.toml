[project]
name = "synnodb"
version = "0.1.0"
description = "Agentic generation of bespoke OLAP database engines (storage plans, base implementations, optimization)."
readme = "README.md"
requires-python = ">=3.12"
# license = "..."   # TODO: confirm the project's license, then set (+ authors)
dependencies = [
    "anthropic>=0.84.0",
    "chardet>=5,<6",
    "charset-normalizer>=3.4.5",
    "duckdb>=1.4.3",
    "landlock>=1.0.0.dev5",
    "litellm>=1.82.0",
    "openai>=2.11.0",
    "openai-agents[litellm]>=0.15.0",
    "pandas>=2.3.3",
    "prompt-toolkit>=3.0.52",
    "psycopg2-binary>=2.9.11",
    "pyarrow>=23.0.1",
    "python-dotenv>=1.2.1",
    "requests>=2.32.5",
    "tabulate>=0.9.0",
    "urllib3>=2.6.3",
    "wandb>=0.26.0",
    "weave>=0.52.22",
]

[project.optional-dependencies]
dev = ["pytest>=9.0.2", "pytest-asyncio>=1.3.0"]
viz = ["matplotlib>=3.10.8", "seaborn>=0.13.2"]
benchmark = ["clickhouse-connect>=0.14.0"]
notebook = ["ipykernel>=7.1.0", "ipywidgets>=8.1.8"]

[project.scripts]
synnodb-storage-plan = "synnodb.run_gen_storage_plan:cli"
synnodb-base-impl = "synnodb.run_gen_base_impl:cli"
synnodb-optim = "synnodb.run_optim_loop:cli"
synnodb-check-sf = "synnodb.run_check_sf_correctness:cli"
synnodb-multi-threading = "synnodb.run_add_multi_threading:cli"

[build-system]
requires = ["setuptools>=64"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src"]
exclude = ["*.test", "*.test.*", "*.tests", "*.tests.*"]

[tool.setuptools.package-data]
"synnodb" = ["py.typed"]
"synnodb.conversations" = ["prompts/**/*"]
"synnodb.cpp_runner" = [
    "prepare_repo/templates/**/*",
    "cpp_helpers/**/*",
    "api/**/*",
    "hotpatch/**/*",
]

[tool.pytest.ini_options]
testpaths = ["tests"]
