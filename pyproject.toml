[project]
name = "synnodb"
version = "0.1.0"
description = "Add your description here"
readme = "README.md"
requires-python = ">=3.13"
dependencies = [
    "anthropic>=0.84.0",
    "clickhouse-connect>=0.14.0",
    "chardet>=5,<6",
    "charset-normalizer>=3.4.5",
    "duckdb>=1.4.3",
    "geoip2>=5.2.0",
    "ipykernel>=7.1.0",
    "ipywidgets>=8.1.8",
    "landlock>=1.0.0.dev5",
    "litellm>=1.82.0",
    "matplotlib>=3.10.8",
    "openai>=2.11.0",
    "openai-agents[litellm]>=0.15.0",
    "pandas>=2.3.3",
    "prompt-toolkit>=3.0.52",
    "psycopg2-binary>=2.9.11",
    "pytest>=9.0.2",
    "pytest-asyncio>=1.3.0",
    "python-dotenv>=1.2.1",
    "requests>=2.32.5",
    "seaborn>=0.13.2",
    "tabulate>=0.9.0",
    "urllib3>=2.6.3",
    "weave>=0.52.22",
    "pyarrow>=23.0.1",
    "wandb>=0.26.0",
    "dotenv>=0.9.9",
]

[build-system]
requires = ["setuptools>=64"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.package-data]
"synnodb.conversations" = ["prompts/**/*"]
"synnodb.cpp_runner" = [
    "prepare_repo/templates/**/*",
    "cpp_helpers/**/*",
    "api/**/*",
    "hotpatch/**/*",
]
