name: lint

on:
  pull_request:
  push:
    branches: [main]

# Cancel superseded runs on the same ref (e.g. rapid force-pushes to a PR).
concurrency:
  group: lint-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ruff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Pinned so CI is reproducible and doesn't break on a new ruff release.
      # Keep this in sync with the ruff version developers run locally.
      - name: Ruff lint
        uses: astral-sh/ruff-action@v3
        with:
          version: "0.15.20"
          args: "check"

      - name: Ruff format check
        uses: astral-sh/ruff-action@v3
        with:
          version: "0.15.20"
          args: "format --check"

  notebook-outputs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Tutorial notebooks must be committed without outputs/execution counts:
      # stored outputs bloat diffs by thousands of lines and cause merge
      # conflicts. Scoped to tutorials/ - the internal research notebooks under
      # src/ keep their outputs (they are excluded from the lint gates too).
      # Strip locally with: uvx nbstripout <notebook.ipynb>
      # Pinned so CI is reproducible and doesn't break on a new release.
      - name: Verify tutorial notebooks are stripped
        run: |
          git ls-files 'tutorials/*.ipynb' | xargs --no-run-if-empty pipx run nbstripout==0.8.1 --verify
