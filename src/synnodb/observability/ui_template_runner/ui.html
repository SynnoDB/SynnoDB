<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>BespokeOLAP Demo Runner</title>
<link rel="stylesheet" href="/style.css">
</head>
<body>
<script>
/* Mirror the wrapper site's light/dark theme. This page is loaded cross-origin
   inside an <iframe> on the SynnoDB site, so it cannot read the parent's
   localStorage/DOM directly. We pick the theme from (1) a ?theme= query param
   (the wrapper forwards its own query string into the frame src), (2) this
   origin's own localStorage (persists across query re-loads of the frame),
   else default to light — matching the wrapper's default. ui.js additionally
   listens for postMessage({type:'theme'}) so the wrapper can push live toggles. */
(function () {
  var KEY = 'bespoke-demo-theme';
  function norm(t) { return (t === 'dark' || t === 'light') ? t : null; }
  var t = null;
  try { t = norm(new URLSearchParams(location.search).get('theme')); } catch (e) {}
  if (!t) { try { t = norm(localStorage.getItem(KEY)); } catch (e) {} }
  if (!t) t = 'light';
  try { localStorage.setItem(KEY, t); } catch (e) {}
  document.body.setAttribute('data-theme', t);
})();
</script>
<header class="site-header">
  <span class="site-logo">BespokeOLAP</span>
  <span class="site-badge">Generated CPP Runner</span>
  <div id="header-meta" class="header-meta"></div>
</header>
<div id="form-area">
  <div id="form-cols">
    <div id="col-left">
      <label for="qsel">Query</label>
      <select id="qsel"></select>
      <div id="placeholders"></div>
    </div>
    <div id="col-right">
      <div class="sql-label">SQL</div>
      <pre id="sql-preview"></pre>
      <div id="sql-scroll-hint" aria-hidden="true">Scroll to see full query ↓</div>
    </div>
  </div>
  <div id="form-bottom">
    <div class="engine-row" id="engine-row" style="display:none">
      <label class="cb-label" id="lbl-umbra" style="display:none"><input type="checkbox" id="cb-umbra" checked> Run against Umbra</label>
      <label class="cb-label" id="lbl-duckdb" style="display:none"><input type="checkbox" id="cb-duckdb"> Run against DuckDB</label>
      <label class="cb-label" id="lbl-clickhouse" style="display:none"><input type="checkbox" id="cb-clickhouse"> Run against ClickHouse</label>
    </div>
    <div class="btn-row">
      <button id="run-btn" onclick="runQuery()">Run</button>
      <!-- <button id="show-btn" class="secondary" onclick="showQuery()">Assemble query / curl</button> -->
    </div>
    <div id="status"></div>
  </div>
</div>
<div id="progress"></div>
<div id="chart"></div>
<div id="output"></div>
<script src="/ui.js"></script>
</body>
</html>
